[global]
# ============================================
# PTP Client Configuration - IEEE 1588v2 (PTPv2)
# ============================================
# This client syncs to a timemachine PTP master

slaveOnly              1

# --- Network Transport Settings ---
network_transport        UDPv4

# --- Delay Mechanism ---
delay_mechanism          E2E

# --- Timestamp Settings ---
time_stamping            hardware
tx_timestamp_timeout     200
twoStepFlag              1

# --- Timing Intervals (log2 seconds) ---
logAnnounceInterval      1
logSyncInterval          1
logMinDelayReqInterval   0

# --- Client Priority Settings ---
priority1                128
priority2                128

# --- Domain Configuration ---
domainNumber             0

# --- Monitoring ---
summary_interval         0

# --- Clock Servo Settings ---
step_threshold           0.00002
first_step_threshold     0.01
max_frequency            900000000

# ============================================
# Interface-Specific Configuration
# ============================================
[eno1]
# Per-interface settings can go here
