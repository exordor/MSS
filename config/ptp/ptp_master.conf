[global]
# ============================================
# PTP Master Configuration - IEEE 1588v2 (PTPv2)
# ============================================
clockClass              7
clockAccuracy           0xFE
offsetScaledLogVariance 0xFFFF
slaveOnly              0
# --- Network Transport Settings ---
network_transport        UDPv4

# --- Delay Mechanism ---
delay_mechanism          E2E

# --- Timestamp Settings ---
time_stamping            hardware
tx_timestamp_timeout     200
twoStepFlag              1

# --- Timing Intervals (log2 seconds) ---
logAnnounceInterval      1
logSyncInterval          1
logMinDelayReqInterval   0

# --- Master Priority Settings ---
priority1                128
priority2                128

# --- Domain Configuration ---
domainNumber             0

# --- Monitoring ---
summary_interval         0

# ============================================
# Interface-Specific Configuration
# ============================================
[eno1]
# Per-interface settings can go here
