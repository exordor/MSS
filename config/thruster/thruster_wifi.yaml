thruster_wifi_node:
  ros__parameters:
    # Network settings
    host: "192.168.50.100"         # Arduino IP address
    arduino_cmd_port: 8888         # Arduino UDP command port (receives C commands)
    arduino_ping_port: 8889        # Arduino UDP ping port (receives PING heartbeat)
    data_port: 28888               # Local port to receive S status and F flow data
    heartbeat_port: 28887          # Local port to receive HEARTBEAT messages
    connect_timeout: 5.0
    read_interval: 0.05
    reconnect_delay: 2.0
    max_reconnect_delay: 60.0
    udp_timeout: 5.0               # Data timeout
    stop_cmd: "C 1500 1500"
    status_frame_id: "thruster_link"

    # Logging configuration
    log_level: "INFO"              # DEBUG, INFO, WARN, ERROR
    enable_heartbeat_log: true
    enable_command_log: true
    enable_status_log: false       # High frequency - disable by default
    enable_speed_log: true         # Enable to debug flow data reception
    log_to_file: false
    log_file_path: "/tmp/thruster_wifi.log"
    max_log_file_size_mb: 10

    # Metrics publishing
    metrics_publish_rate: 1.0      # Hz
