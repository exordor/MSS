# ROS2 Logging Configuration File
# Usage:
#   1. Specify profile via --log-profile: ./run_ros2_camera.sh --log-profile prod
#   2. Via environment variable: export LOG_PROFILE=prod
#   3. Via custom config: ./run_ros2_camera.sh --log-config /path/to/config.yaml

# Default profile (used when not specified)
default_profile: dev

# Profile definitions
profiles:
  # Development - verbose output, colorized, easy to debug
  dev:
    rcutils:
      use_stdout: 1
      colorized_output: 1
      console_output_format: '[{time}] [{severity}] [{name}] {message}'
      buffered_stream: 0
      log_level: info
    python:
      unbuffered: 1
      verbose: 0

  # Production - minimal output, structured logging
  prod:
    rcutils:
      use_stdout: 1
      colorized_output: 0
      console_output_format: '[{time}] [{severity}] [{name}] {message}'
      buffered_stream: 1
      log_level: warn
    python:
      unbuffered: 1
      verbose: 0

  # Debug - maximum verbosity, includes file and line number
  debug:
    rcutils:
      use_stdout: 1
      colorized_output: 1
      console_output_format: '[{time}] [{severity}] [{name}] [{file}:{line}] {message}'
      buffered_stream: 0
      log_level: debug
    python:
      unbuffered: 1
      verbose: 1

  # Minimal - errors only
  minimal:
    rcutils:
      use_stdout: 1
      colorized_output: 0
      console_output_format: '{severity}: {message}'
      buffered_stream: 1
      log_level: error
    python:
      unbuffered: 0
      verbose: 0
