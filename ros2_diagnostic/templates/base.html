<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ROS2 System Diagnostic{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome (for icons) - lazy load -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">

    <!-- Main CSS -->
    <link rel="stylesheet" href="/static/css/main.css?v=4">

    <!-- Base styles (notifications, navigation) -->
    <link rel="stylesheet" href="/static/css/base.css">

    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <i class="fa-solid fa-robot"></i>
                <span>ROS2 Diagnostic</span>
            </div>
            <ul class="navbar-nav">
                <li class="nav-item {% if page == 'dashboard' %}active{% endif %}">
                    <a href="/" class="nav-link">
                        <i class="fa-solid fa-gauge-high"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item {% if page == 'events' %}active{% endif %}">
                    <a href="/events" class="nav-link">
                        <i class="fa-solid fa-clipboard-list"></i>
                        <span>Events</span>
                    </a>
                </li>
                <li class="nav-item {% if page == 'sensors' %}active{% endif %}">
                    <a href="/sensors" class="nav-link">
                        <i class="fa-solid fa-microchip"></i>
                        <span>Sensors</span>
                    </a>
                </li>
                <li class="nav-item {% if page == 'tools' %}active{% endif %}">
                    <a href="/tools" class="nav-link">
                        <i class="fa-solid fa-screwdriver-wrench"></i>
                        <span>Tools</span>
                    </a>
                </li>
                <li class="nav-item {% if page == 'logs' %}active{% endif %}">
                    <a href="/logs" class="nav-link">
                        <i class="fa-solid fa-file-lines"></i>
                        <span>Logs</span>
                    </a>
                </li>
            </ul>
            <div class="navbar-actions">
                <button id="alertNotificationBtn" class="btn-icon" title="View Alerts" onclick="window.location.href='/'">
                    <i class="fa-solid fa-bell"></i>
                    <span id="alertNotificationBadge" class="notification-badge">0</span>
                </button>
                <button id="autoRefreshBtn" class="btn-icon" title="Toggle Auto Refresh">
                    <i class="fa-solid fa-sync"></i>
                </button>
                <span id="lastUpdated" class="last-updated">Updating...</span>
            </div>
        </div>
    </nav>

    <!-- Alert Notification Banner -->
    <div id="alertNotificationBanner" class="alert-notification-banner hidden">
        <div class="notification-content">
            <i class="fa-solid fa-bell notification-icon"></i>
            <span id="notificationMessage" class="notification-message"></span>
            <button class="btn-notification-close" onclick="closeNotificationBanner()" title="Dismiss">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <span>ROS2 System Diagnostic &copy; 2026</span>
            <span id="connectionStatus" class="connection-status connected">
                <i class="fa-solid fa-circle"></i> Connected
            </span>
        </div>
    </footer>

    <!-- Main JavaScript -->
    <script src="/static/js/main.js?v=2" defer></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
